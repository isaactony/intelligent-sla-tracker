version: '3.8'
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sladb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: bash -c "python src/manage.py migrate && python src/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: bash -c "celery -A slatracker worker --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    command: bash -c "celery -A slatracker beat --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
